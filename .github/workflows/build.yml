name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Extract Android project
        run: |
          tar -xzf android.tar.gz
          ls -la
          ls -la app/

      - name: Copy web assets to Android
        run: |
          mkdir -p app/src/main/assets/public
          cp index.html app/src/main/assets/public/
          cp story.json app/src/main/assets/public/
          ls app/src/main/assets/public/

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1 | tail -80
        continue-on-error: true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aianxiety-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const apkPath = 'app/build/outputs/apk/debug/app-debug.apk';
            if (!fs.existsSync(apkPath)) { core.setFailed('APK not found'); return; }
            const apkData = fs.readFileSync(apkPath);
            let releaseId;
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner, repo: context.repo.repo, tag: 'v1.0.0'
              });
              releaseId = release.data.id;
            } catch {
              const newRelease = await github.rest.repos.createRelease({
                owner: context.repo.owner, repo: context.repo.repo,
                tag_name: 'v1.0.0', name: '《最后的简历》v1.0.0',
                body: '## 《最后的简历》\n\n**在线版**: https://shawnjlewis.github.io/ai-anxiety/\n\n**APK**: 点击右侧 Artifacts 下载',
                draft: false
              });
              releaseId = newRelease.data.id;
            }
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner, repo: context.repo.repo, release_id: releaseId,
              name: 'ai-anxiety-debug.apk',
              data: Buffer.from(apkData).toString('base64'),
              headers: { 'Content-Type': 'application/vnd.android.package-archive', 'Content-Length': apkData.length }
            });
