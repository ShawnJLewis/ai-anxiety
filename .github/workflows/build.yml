name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download Android base project
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sL -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/android.tar.gz" | \
            python3 -c "import sys,json,base64,os; d=json.load(sys.stdin); open('android.tar.gz','wb').write(base64.b64decode(d['content']))"
          tar -xzf android.tar.gz
          ls -la
          echo "---Android dir---"
          ls -la android/
          echo "Done"

      - name: Install npm dependencies
        run: |
          rm -rf package-lock.json node_modules
          npm install --ignore-scripts --registry=https://registry.npmjs.org

      - name: Sync web assets
        run: npx cap sync android
        continue-on-error: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: |
          ls -la
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1 | tail -30
        env:
          ANDROID_SDK_ROOT: /opt/android-sdk

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aianxiety-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const apkPath = 'android/app/build/outputs/apk/debug/app-debug.apk';
            if (!fs.existsSync(apkPath)) { core.setFailed('APK not found'); return; }
            const apkData = fs.readFileSync(apkPath);
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner, repo: context.repo.repo, tag: 'v1.0.0'
            }).catch(() => null);
            let releaseId;
            if (!release) {
              const newRelease = await github.rest.repos.createRelease({
                owner: context.repo.owner, repo: context.repo.repo,
                tag_name: 'v1.0.0', name: '《最后的简历》v1.0.0',
                body: '## 《最后的简历》\\n\\n**在线版**: https://shawnjlewis.github.io/ai-anxiety/\\n\\n**APK下载**: 点击本页面右侧的 APK artifact 下载',
                draft: false
              });
              releaseId = newRelease.data.id;
            } else {
              releaseId = release.data.id;
            }
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner, repo: context.repo.repo, release_id: releaseId,
              name: 'chronicle-debug.apk',
              data: Buffer.from(apkData).toString('base64'),
              headers: { 'Content-Type': 'application/vnd.android.package-archive', 'Content-Length': apkData.length }
            });