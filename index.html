<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最后的简历</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --text: #e0e0e8;
      --muted: #6b6b7a;
      --accent: #e8c96e;
      --danger: #e85d5d;
      --ok: #5de8a0;
      --font: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    #stats { width: 100%; max-width: 640px; display: none; gap: 8px; margin-bottom: 12px; }
    .stat { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .stat-label { width: 70px; color: var(--muted); flex-shrink: 0; }
    .stat-bar { flex: 1; height: 4px; background: #22222e; border-radius: 2px; overflow: hidden; }
    .stat-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    #game { width: 100%; max-width: 640px; background: var(--card); border-radius: 16px; padding: 28px 24px; margin-top: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    #chapter { font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
    #text { font-size: 15px; line-height: 1.85; color: var(--text); white-space: pre-wrap; margin-bottom: 24px; min-height: 120px; }
    #sbti { display: none; background: linear-gradient(135deg, #1a1a28, #20202e); border: 1px solid var(--accent); border-radius: 12px; padding: 16px; margin-bottom: 20px; text-align: center; }
    #sbti-type { font-size: 32px; font-weight: 700; color: var(--accent); letter-spacing: 3px; }
    #sbti-name { font-size: 14px; color: var(--text); margin: 6px 0 4px; }
    #sbti-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
    #choices { display: flex; flex-direction: column; gap: 10px; }
    .choice { background: #1c1c28; border: 1px solid #2a2a3a; border-radius: 10px; padding: 14px 16px; text-align: left; font-size: 14px; color: var(--text); cursor: pointer; transition: all 0.18s ease; line-height: 1.5; }
    .choice:hover { background: #252536; border-color: var(--accent); transform: translateX(3px); }
    .choice:active { transform: translateX(3px) scale(0.99); }
    #share-btn { display: none; width: 100%; max-width: 640px; margin-top: 12px; background: linear-gradient(135deg, #1f2a1f, #1a2a1a); border: 1px solid var(--ok); color: var(--ok); padding: 14px; border-radius: 10px; font-size: 14px; cursor: pointer; }
    #restart-btn { display: none; width: 100%; max-width: 640px; margin-top: 8px; background: transparent; border: 1px solid #333; color: var(--muted); padding: 12px; border-radius: 10px; font-size: 13px; cursor: pointer; }
    #loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    #progress-bar { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); transition: width 0.3s; }
    .sbti-tag { display: inline-block; font-size: 10px; background: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; margin-bottom: 8px; letter-spacing: 1px; }
  </style>
</head>
<body>
<div id="progress-bar" style="width:0%"></div>
<div id="stats"></div>
<div id="game">
  <div id="loading">加载中...</div>
</div>
<button id="share-btn" onclick="shareResult()">📤 分享我的AI焦虑类型</button>
<button id="restart-btn" onclick="restartGame()">🔄 重新开始</button>

<script>
const STORY_URL = 'story.json';
let story = {};
let state = { stats: {}, tags: [] };

async function loadStory() {
  const resp = await fetch(STORY_URL + '?t=' + Date.now());
  story = await resp.json();
  state = {
    node: story.game.start,
    stats: {},
    tags: [],
    sbtiTypes: []
  };
  for (const [key, cfg] of Object.entries(story.stats)) {
    state.stats[key] = cfg.start;
  }
  document.getElementById('loading').textContent = '';
  render();
}

function render() {
  const node = story.nodes[state.node];
  if (!node) { document.getElementById('text').textContent = '节点不存在: ' + state.node; return; }

  const game = document.getElementById('game');
  let html = '';

  // Stats
  const statsEl = document.getElementById('stats');
  let statsHtml = '';
  for (const [key, val] of Object.entries(state.stats)) {
    const cfg = story.stats[key];
    const pct = Math.round((val / cfg.max) * 100);
    const color = key === 'anxiety' ? (pct > 70 ? '#e85d5d' : pct > 40 ? '#e8c96e' : '#5de8a0') : '#5de8a0';
    statsHtml += `<div class="stat"><span class="stat-label">${cfg.label}</span><div class="stat-bar"><div class="stat-fill" style="width:${pct}%;background:${color}"></div></div><span style="font-size:11px;color:${color}">${val}</span></div>`;
  }
  statsEl.innerHTML = statsHtml;
  statsEl.style.display = 'flex';
  statsEl.style.flexDirection = 'column';
  statsEl.style.gap = '6px';

  // Chapter
  if (node.text.match(/【第.+?】/)) {
    const ch = node.text.match(/【(.+?)】/)[1];
    html += `<div id="chapter">${ch}</div>`;
  } else if (state.node === 'prologue') {
    html += `<div id="chapter">序章</div>`;
  }

  // Text
  html += `<div id="text">${node.text}</div>`;

  // SBTI result
  if (node.ending) {
    const sbtiKey = node.sbti;
    const sbti = story.sbti_types[sbtiKey];
    html += `<div id="sbti"><div class="sbti-tag">你的AI焦虑类型</div><div id="sbti-type">${sbtiKey}</div><div id="sbti-name">${sbti.name}</div><div id="sbti-desc">${sbti.desc}</div></div>`;
    document.getElementById('share-btn').style.display = 'block';
    document.getElementById('restart-btn').style.display = 'block';
    state.sbtiTypes.push(sbtiKey);
  }

  // Choices
  if (node.choices && node.choices.length > 0) {
    html += `<div id="choices">`;
    for (const c of node.choices) {
      if (c.requires && !c.requires.some(t => state.tags.includes(t))) continue;
      const tag = c.tags ? c.tags.map(t => `<span style="font-size:10px;color:#888;margin-right:4px">#${t}</span>`).join('') : '';
      html += `<button class="choice" onclick="choose('${c.next}', ${JSON.stringify(c.effects || {})}, ${JSON.stringify(c.tags || [])})">${tag}${c.text}</button>`;
    }
    html += `</div>`;
  } else if (node.ending) {
    html += `<div style="text-align:center;color:var(--muted);font-size:13px;margin-top:8px">— 完 —</div>`;
  }

  document.getElementById('text') ? null : game.insertAdjacentHTML('beforeend', '<div id="text"></div>');
  document.getElementById('chapter') ? null : game.insertAdjacentHTML('beforeend', '');
  document.getElementById('choices') ? null : game.insertAdjacentHTML('beforeend', '');

  game.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function choose(next, effects, tags) {
  for (const [key, val] of Object.entries(effects)) {
    if (story.stats[key]) {
      state.stats[key] = Math.max(story.stats[key].min, Math.min(story.stats[key].max, state.stats[key] + val));
    }
  }
  if (tags) state.tags.push(...tags);
  state.node = next;
  render();
  updateProgress();
}

function updateProgress() {
  const visited = new Set();
  let count = 0;
  function walk(n) {
    if (visited.has(n)) return;
    visited.add(n);
    count++;
    const node = story.nodes[n];
    if (node && node.choices) {
      node.choices.forEach(c => {
        if (!c.requires) walk(c.next);
      });
    }
  }
  walk(story.game.start);
  const total = Object.keys(story.nodes).length;
  const pct = Math.min(100, Math.round((visited.size / total) * 100));
  document.getElementById('progress-bar').style.width = pct + '%';
}

function shareResult() {
  const key = state.sbtiTypes[state.sbtiTypes.length - 1];
  const sbti = story.sbti_types[key];
  const text = `我的AI焦虑类型是 ${key} · ${sbti.name}\n${sbti.desc}\n\n来测试你的：《最后的简历》\n🌐 https://shawnjlewis.github.io/ai-anxiety/`;
  if (navigator.share) {
    navigator.share({ title: '我的AI焦虑类型', text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
  }
}

function restartGame() {
  localStorage.removeItem('ai-anxiety-state');
  state = { node: story.game.start, stats: {}, tags: [], sbtiTypes: [] };
  for (const [key, cfg] of Object.entries(story.stats)) state.stats[key] = cfg.start;
  document.getElementById('share-btn').style.display = 'none';
  document.getElementById('restart-btn').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  render();
}

loadStory();
</script>
</body>
</html>
