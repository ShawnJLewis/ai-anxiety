<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最后的简历 - Inky版本</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
  #game { max-width: 640px; width: 100%; }
  #story-text { font-size: 17px; line-height: 1.9; margin-bottom: 28px; white-space: pre-wrap; }
  .line { margin-bottom: 6px; }
  .ending { color: #f0c040; font-weight: bold; font-size: 15px; margin-top: 12px; }
  #choices { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .choice {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 13px 18px;
    font-size: 16px;
    color: #d0d0d0;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.5;
  }
  .choice:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
  .choice:active { background: rgba(255,255,255,0.18); }
  #restart {
    display: none;
    margin-top: 24px;
    background: rgba(240,192,64,0.15);
    border: 1px solid rgba(240,192,64,0.4);
    border-radius: 8px;
    padding: 11px 22px;
    font-size: 15px;
    color: #f0c040;
    cursor: pointer;
  }
  #restart:hover { background: rgba(240,192,64,0.25); }
  #loading { color: #666; font-size: 14px; margin-bottom: 20px; }
  .fade-in { animation: fadein 0.3s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="game">
  <div id="loading">正在编译故事脚本...</div>
  <div id="story-text"></div>
  <div id="choices"></div>
  <button id="restart" onclick="restartGame()">重新开始</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/inkjs@2.4.0/dist/ink-es6.js"></script>
<script>
// story.ink file - loaded inline via compilation
const storySource = `
INCLUDE story.ink
`;

let story = null;
let paragraphIndex = 0;

function onReady() {
  document.getElementById('loading').style.display = 'none';
  continueStory(true);
}

function continueStory(firstTime) {
  const textEl = document.getElementById('story-text');
  const choicesEl = document.getElementById('choices');
  
  // Collect all available paragraphs
  while (story.canContinue) {
    const p = story.Continue();
    paragraphIndex++;
    const div = document.createElement('div');
    div.className = 'line fade-in';
    div.textContent = p;
    textEl.appendChild(div);
  }
  
  // Show choices
  choicesEl.innerHTML = '';
  const choices = story.currentChoices;
  if (choices && choices.length > 0) {
    choices.forEach((choice, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = choice.text;
      btn.onclick = () => {
        story.ChooseChoiceIndex(i);
        continueStory(false);
      };
      choicesEl.appendChild(btn);
    });
  } else {
    // End of story
    document.getElementById('restart').style.display = 'block';
  }
  
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function restartGame() {
  document.getElementById('story-text').innerHTML = '';
  document.getElementById('choices').innerHTML = '';
  document.getElementById('restart').style.display = 'none';
  story.ResetHistory();
  continueStory(true);
}

// Load and compile the ink file
fetch('story.ink')
  .then(r => {
    if (!r.ok) throw new Error('找不到 story.ink，请确保 story.ink 在同一目录下');
    return r.text();
  })
  .then(inkSource => {
    story = new inkjs.Story(inkSource);
    onReady();
  })
  .catch(err => {
    document.getElementById('loading').textContent = '加载失败: ' + err.message;
  });
</script>
</body>
</html>
