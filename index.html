<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最后的简历</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --text: #e0e0e8;
      --muted: #6b6b7a;
      --accent: #e8c96e;
      --danger: #e85d5d;
      --ok: #5de8a0;
      --font: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    #stats { width: 100%; max-width: 640px; display: none; gap: 8px; margin-bottom: 12px; }
    .stat { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .stat-label { width: 70px; color: var(--muted); flex-shrink: 0; }
    .stat-bar { flex: 1; height: 4px; background: #22222e; border-radius: 2px; overflow: hidden; }
    .stat-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    #game { width: 100%; max-width: 640px; background: var(--card); border-radius: 16px; padding: 28px 24px; margin-top: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    #chapter { font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
    #text { font-size: 15px; line-height: 1.85; color: var(--text); white-space: pre-wrap; margin-bottom: 24px; min-height: 120px; }
    #sbti { display: none; background: linear-gradient(135deg, #1a1a28, #20202e); border: 1px solid var(--accent); border-radius: 12px; padding: 16px; margin-bottom: 20px; text-align: center; }
    #sbti-type { font-size: 32px; font-weight: 700; color: var(--accent); letter-spacing: 3px; }
    #sbti-name { font-size: 14px; color: var(--text); margin: 6px 0 4px; }
    #sbti-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
    #choices { display: flex; flex-direction: column; gap: 10px; }
    .choice { background: #1c1c28; border: 1px solid #2a2a3a; border-radius: 10px; padding: 14px 16px; text-align: left; font-size: 14px; color: var(--text); cursor: pointer; transition: all 0.18s ease; line-height: 1.5; }
    .choice:hover { background: #252536; border-color: var(--accent); transform: translateX(3px); }
    .choice:active { transform: translateX(3px) scale(0.99); }
    #share-btn { display: none; width: 100%; max-width: 640px; margin-top: 12px; background: linear-gradient(135deg, #1f2a1f, #1a2a1a); border: 1px solid var(--ok); color: var(--ok); padding: 14px; border-radius: 10px; font-size: 14px; cursor: pointer; }
    #restart-btn { display: none; width: 100%; max-width: 640px; margin-top: 8px; background: transparent; border: 1px solid #333; color: var(--muted); padding: 12px; border-radius: 10px; font-size: 13px; cursor: pointer; }
    #loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    #progress-bar { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); transition: width 0.3s; }
    .sbti-tag { display: inline-block; font-size: 10px; background: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; margin-bottom: 8px; letter-spacing: 1px; }
    #resume { display: none; margin-top: 20px; }
    .resume-card { background: #fff; border-radius: 8px; padding: 28px; color: #222; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .resume-blank { background: #f9f9f9; border: 1px solid #e0e0e0; height: 180px; display: flex; align-items: center; justify-content: center; }
    .resume-blank .resume-quote { font-size: 20px; color: #555; font-style: italic; letter-spacing: 2px; text-align: center; }
    .resume-full { max-width: 580px; margin: 0 auto; }
    .resume-header { border-bottom: 2px solid #222; padding-bottom: 14px; margin-bottom: 18px; }
    .resume-name { font-size: 26px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .resume-title { font-size: 13px; color: #666; margin-bottom: 6px; }
    .resume-contact { font-size: 12px; color: #888; }
    .resume-section { margin-bottom: 16px; }
    .resume-section-title { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    .resume-exp-item { margin-bottom: 10px; }
    .resume-exp-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
    .resume-exp-role { font-size: 14px; font-weight: 600; color: #111; }
    .resume-exp-period { font-size: 11px; color: #aaa; }
    .resume-exp-company { font-size: 12px; color: #555; margin-bottom: 2px; }
    .resume-exp-desc { font-size: 12px; color: #666; line-height: 1.5; }
    .resume-skills { display: flex; flex-wrap: wrap; gap: 6px; }
    .resume-skill { font-size: 11px; background: #f0f0f0; color: #444; padding: 3px 10px; border-radius: 20px; }
    .resume-quote-footer { margin-top: 20px; padding-top: 14px; border-top: 1px solid #eee; font-size: 13px; color: #888; font-style: italic; text-align: center; }
  </style>
</head>
<body>
<div id="progress-bar" style="width:0%"></div>
<div id="stats"></div>
<div id="game">
  <div id="loading">加载中...</div>
</div>
<button id="share-btn" onclick="shareResult()">📤 分享我的AI焦虑类型</button>
<button id="restart-btn" onclick="restartGame()">🔄 重新开始</button>

<script>
// ── State ──────────────────────────────────────────────────────────
const STORY_URL = 'story.json';
let story = {};
let state = { node: '', stats: {}, tags: [], sbtiTypes: [] };

// ── Init ──────────────────────────────────────────────────────────
async function loadStory() {
  try {
    const resp = await fetch(STORY_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('story.json 加载失败');
    story = await resp.json();
  } catch(e) {
    document.getElementById('game').innerHTML =
      '<div style="color:#e85d5d;padding:20px">故事加载失败，请刷新重试。<br><small>' + e.message + '</small></div>';
    return;
  }
  state = { node: story.game.start, stats: {}, tags: [], sbtiTypes: [] };
  for (const [k, cfg] of Object.entries(story.stats)) state.stats[k] = cfg.start;
  document.getElementById('loading').textContent = '';
  render();
}

// ── Escape helper (prevent HTML injection in button text) ───────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Resume builder ─────────────────────────────────────────────────
function buildResumeHtml(resume) {
  if (!resume.name) {
    return `<div class="resume-card resume-blank"><div class="resume-quote">"${esc(resume.quote || '')}"</div></div>`;
  }
  let exp = '';
  for (const x of (resume.experience || [])) {
    exp += `<div class="resume-exp-item">
      <div class="resume-exp-header"><span class="resume-exp-role">${esc(x.role)}</span><span class="resume-exp-period">${esc(x.period)}</span></div>
      <div class="resume-exp-company">${esc(x.company)}</div>
      <div class="resume-exp-desc">${esc(x.desc)}</div>
    </div>`;
  }
  let sk = '';
  for (const s of (resume.skills || [])) sk += `<span class="resume-skill">${esc(s)}</span>`;
  let h = `<div class="resume-card"><div class="resume-full">`;
  h += `<div class="resume-header"><div class="resume-name">${esc(resume.name)}</div>`;
  h += `<div class="resume-title">${esc(resume.title || '')}</div>`;
  h += `<div class="resume-contact">${esc(resume.contact || '')}</div></div>`;
  if (exp) h += `<div class="resume-section"><div class="resume-section-title">经历</div>${exp}</div>`;
  if (sk) h += `<div class="resume-section"><div class="resume-section-title">技能</div><div class="resume-skills">${sk}</div></div>`;
  if (resume.quote) h += `<div class="resume-quote-footer">"${esc(resume.quote)}"</div>`;
  h += `</div></div>`;
  return h;
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const node = story.nodes[state.node];
  if (!node) {
    document.getElementById('game').innerHTML = '<div id="text" style="color:#e85d5d">节点不存在: ' + esc(state.node) + '</div>';
    return;
  }

  let html = '';

  // Chapter label
  const chMatch = node.text.match(/【(.+?)】/);
  if (chMatch) {
    html += `<div id="chapter">${esc(chMatch[1])}</div>`;
  } else if (state.node === 'prologue') {
    html += `<div id="chapter">序章</div>`;
  }

  // Story text
  html += `<div id="text">${node.text}</div>`;

  // Ending: SBTI + resume
  if (node.ending) {
    const sbti = story.sbti_types[node.sbti];
    html += `<div id="sbti">
      <div class="sbti-tag">你的AI焦虑类型</div>
      <div id="sbti-type">${esc(node.sbti)}</div>
      <div id="sbti-name">${esc(sbti.name)}</div>
      <div id="sbti-desc">${esc(sbti.desc)}</div>
    </div>`;
    html += `<div id="resume">${buildResumeHtml(node.resume || {})}</div>`;
    document.getElementById('share-btn').style.display = 'block';
    document.getElementById('restart-btn').style.display = 'block';
    state.sbtiTypes.push(node.sbti);
  }

  // Choices
  if (node.choices && node.choices.length > 0) {
    html += `<div id="choices">`;
    for (const c of node.choices) {
      if (c.requires && !c.requires.some(t => state.tags.includes(t))) continue;
      const tags = c.tags ? c.tags.map(t => `<span style="font-size:10px;color:#888;margin-right:4px">#${esc(t)}</span>`).join('') : '';
      const data = esc(JSON.stringify({ next: c.next, effects: c.effects || {}, tags: c.tags || [] }));
      // Use data-* instead of onclick — no JS eval, no quote escaping
      html += `<button class="choice" data-choice="${data}">${tags}${esc(c.text)}</button>`;
    }
    html += `</div>`;
  } else if (node.ending) {
    html += `<div style="text-align:center;color:var(--muted);font-size:13px;margin-top:8px">— 完 —</div>`;
  }

  document.getElementById('game').innerHTML = html;

  // Stats bars
  const statsEl = document.getElementById('stats');
  let sHtml = '';
  for (const [k, v] of Object.entries(state.stats)) {
    const cfg = story.stats[k];
    const pct = Math.round((v / cfg.max) * 100);
    const col = k === 'anxiety' ? (pct > 70 ? '#e85d5d' : pct > 40 ? '#e8c96e' : '#5de8a0') : '#5de8a0';
    sHtml += `<div class="stat"><span class="stat-label">${esc(cfg.label)}</span>`;
    sHtml += `<div class="stat-bar"><div class="stat-fill" style="width:${pct}%;background:${col}"></div></div>`;
    sHtml += `<span style="font-size:11px;color:${col}">${v}</span></div>`;
  }
  statsEl.innerHTML = sHtml;
  statsEl.style.display = 'flex';
  statsEl.style.flexDirection = 'column';
  statsEl.style.gap = '6px';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Event delegation: catch all button clicks ──────────────────────
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.choice');
  if (!btn) return;
  const raw = btn.dataset.choice;
  if (!raw) return;
  try {
    const { next, effects, tags } = JSON.parse(raw);
    doChoose(next, effects, tags);
  } catch(err) {
    console.error('选项解析失败:', err);
  }
});

function doChoose(next, effects, tags) {
  for (const [k, v] of Object.entries(effects)) {
    if (story.stats[k]) {
      const cfg = story.stats[k];
      state.stats[k] = Math.max(cfg.min, Math.min(cfg.max, state.stats[k] + v));
    }
  }
  if (tags) state.tags.push(...tags);
  state.node = next;
  render();
  updateProgress();
}

// Expose choose globally for any legacy inline onclick (safety net)
window.choose = function(next, effects, tags) {
  doChoose(next, effects || {}, tags || []);
};

function updateProgress() {
  const visited = new Set();
  function walk(n) {
    if (visited.has(n)) return;
    visited.add(n);
    const nd = story.nodes[n];
    if (nd && nd.choices) nd.choices.forEach(c => { if (!c.requires) walk(c.next); });
  }
  walk(story.game.start);
  const pct = Math.min(100, Math.round((visited.size / Object.keys(story.nodes).length) * 100));
  document.getElementById('progress-bar').style.width = pct + '%';
}

function shareResult() {
  const key = state.sbtiTypes[state.sbtiTypes.length - 1];
  const sbti = story.sbti_types[key];
  const resume = story.nodes[state.node].resume || {};
  const text = `我的AI焦虑类型是 ${key} · ${sbti.name}\n${sbti.desc}\n\n${resume.quote ? '「' + resume.quote + '」\n\n' : ''}来测试你的：《最后的简历》\nhttps://shawnjlewis.github.io/ai-anxiety/`;
  if (navigator.share) {
    navigator.share({ title: '我的AI焦虑类型', text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
  }
}

function restartGame() {
  localStorage.removeItem('ai-anxiety-state');
  state = { node: story.game.start, stats: {}, tags: [], sbtiTypes: [] };
  for (const [k, cfg] of Object.entries(story.stats)) state.stats[k] = cfg.start;
  document.getElementById('share-btn').style.display = 'none';
  document.getElementById('restart-btn').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  render();
}

// ── Go ─────────────────────────────────────────────────────────────
loadStory();
</script>
</body>
</html>
